<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Prophecy — Debug Viewer</title>
  <link rel="stylesheet" href="styles/debug.css" />
</head>
<body>

<div id="toolbar">
  <h1>🔧 Debug Viewer</h1>
  <button class="tb-btn active" id="btn-show-sprites" onclick="showSection('sprites')">🎞 Animations</button>
  <button class="tb-btn"        id="btn-show-spawn"   onclick="showSection('spawn')">👾 Spawn Arena</button>
  <button class="tb-btn"                              onclick="toggleAllState()">⏯ Toggle All idle/attack</button>
  <span id="fps-label">FPS: —</span>
  <span id="info-label">Hover a card for details</span>
</div>

<!-- Animation card grid -->
<div id="sprite-grid"></div>

<!-- Spawn arena -->
<div id="spawn-section">
  <h2>👾 Spawn Arena — use buttons to spawn enemies / place units</h2>
  <div id="spawn-canvas-wrap">
    <canvas id="spawn-canvas" width="900" height="420"></canvas>
  </div>
  <div id="spawn-controls"></div>
  <div id="spawn-log"></div>
</div>

<script type="module" src="src/debug.js"></script>
</body>
</html>
