<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Prophecy — Debug Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #eee;
      font-family: monospace;
      font-size: 13px;
    }

    /* ── Top toolbar ── */
    #toolbar {
      position: sticky;
      top: 0;
      background: #1a1a2e;
      border-bottom: 2px solid #444;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      z-index: 10;
    }
    #toolbar h1 { font-size: 15px; color: #8af; margin-right: 6px; }
    .tb-btn {
      padding: 5px 14px;
      background: #2a2a50;
      color: #adf;
      border: 1px solid #446;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .tb-btn:hover { background: #3a3a70; }
    .tb-btn.active { background: #445588; border-color: #88f; }
    #fps-label { color: #8f8; font-size: 12px; }
    #info-label { color: #fa8; font-size: 12px; }

    /* ── Grid of sprite cards ── */
    #sprite-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      padding: 14px;
    }

    .card {
      background: #1e1e2e;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 180px;
    }
    .card h3 { font-size: 12px; color: #adf; text-align: center; }
    .card canvas {
      background: #2a3a2a;
      border: 1px solid #444;
      border-radius: 3px;
      image-rendering: pixelated;
    }
    .card .meta {
      font-size: 10px;
      color: #888;
      text-align: center;
      line-height: 1.5;
    }
    .card .state-btn {
      padding: 3px 10px;
      font-size: 11px;
      background: #2a2a40;
      color: #cdf;
      border: 1px solid #445;
      border-radius: 3px;
      cursor: pointer;
    }
    .card .state-btn:hover { background: #3a3a60; }
    .card .frame-bar {
      width: 100%;
      height: 6px;
      background: #333;
      border-radius: 3px;
      overflow: hidden;
    }
    .card .frame-fill {
      height: 100%;
      background: #4af;
      border-radius: 3px;
      transition: width 0.05s;
    }

    /* ── Spawn section ── */
    #spawn-section {
      padding: 14px;
      border-top: 2px solid #333;
      display: none;
    }
    #spawn-section.visible { display: block; }
    #spawn-section h2 { color: #fa8; margin-bottom: 10px; }
    #spawn-canvas-wrap {
      position: relative;
      display: inline-block;
      border: 2px solid #446;
      border-radius: 4px;
    }
    #spawn-canvas { background: #1a2a1a; display: block; }
    #spawn-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .spawn-btn {
      padding: 6px 14px;
      background: #2a3040;
      color: #cef;
      border: 1px solid #446;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .spawn-btn:hover { background: #3a4060; }
    #spawn-log {
      margin-top: 8px;
      color: #8c8;
      font-size: 11px;
      max-height: 60px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>🔧 Debug Viewer</h1>
  <button class="tb-btn active" id="btn-show-sprites" onclick="showSection('sprites')">🎞 Animations</button>
  <button class="tb-btn" id="btn-show-spawn"  onclick="showSection('spawn')">👾 Spawn Arena</button>
  <button class="tb-btn" onclick="toggleAllState()">⏯ Toggle All idle/attack</button>
  <span id="fps-label">FPS: —</span>
  <span id="info-label">Hover a card for details</span>
</div>

<!-- ── Animation grid ── -->
<div id="sprite-grid"></div>

<!-- ── Spawn arena ── -->
<div id="spawn-section">
  <h2>👾 Spawn Arena — click the canvas to add a unit, use buttons to spawn enemies</h2>
  <div id="spawn-canvas-wrap">
    <canvas id="spawn-canvas" width="900" height="420"></canvas>
  </div>
  <div id="spawn-controls"></div>
  <div id="spawn-log"></div>
</div>

<script type="module">
// ── Import game data ─────────────────────────────────────────────────────────
import { UNIT_DEFS }  from './src/data/unitDefs.js';
import { ENEMY_DEFS } from './src/data/enemyDefs.js';
import { CONFIG }     from './src/utils/CONFIG.js';

const ANIM_FPS = 10;

// ── Image loader ─────────────────────────────────────────────────────────────
const imageCache = {};
function loadImage(src) {
  if (imageCache[src]) return Promise.resolve(imageCache[src]);
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload  = () => { imageCache[src] = img; res(img); };
    img.onerror = () => { imageCache[src] = null; res(null); };
    img.src = src;
  });
}
async function loadImages(srcs) {
  await Promise.all([...new Set(srcs.filter(Boolean))].map(loadImage));
}

// ── Section toggle ────────────────────────────────────────────────────────────
window.showSection = function(which) {
  document.getElementById('sprite-grid').style.display    = which === 'sprites' ? 'flex' : 'none';
  document.getElementById('spawn-section').classList.toggle('visible', which === 'spawn');
  document.getElementById('btn-show-sprites').classList.toggle('active', which === 'sprites');
  document.getElementById('btn-show-spawn').classList.toggle('active',  which === 'spawn');
};

// ── Sprite card renderer ─────────────────────────────────────────────────────

class SpriteCard {
  constructor(label, config, type) {
    this.label  = label;
    this.config = config;
    this.type   = type;   // 'unit' | 'enemy'

    this.state       = 'idle';   // 'idle' | 'attack' | 'melee'
    this.frameIndex  = 0;
    this.frameTimer  = 0;
    this.frameDur    = 1 / ANIM_FPS;

    this.idleImg   = null;
    this.attackImg = null;
    this.meleeImg  = null;
    // individual frames
    this.idleImgs   = [];
    this.attackImgs = [];

    this.canvas = document.createElement('canvas');
    this.canvas.width  = 160;
    this.canvas.height = 160;
    this.ctx = this.canvas.getContext('2d');

    this.frameFill = null;
    this._buildCard();
  }

  _buildCard() {
    const card = document.createElement('div');
    card.className = 'card';

    const h3 = document.createElement('h3');
    h3.textContent = this.label + (this.config.faction ? ` [${this.config.faction}]` : '');
    card.appendChild(h3);
    card.appendChild(this.canvas);

    // Frame progress bar
    const bar  = document.createElement('div'); bar.className = 'frame-bar';
    const fill = document.createElement('div'); fill.className = 'frame-fill';
    bar.appendChild(fill);
    this.frameFill = fill;
    card.appendChild(bar);

    // State toggle button
    const btn = document.createElement('button');
    btn.className   = 'state-btn';
    btn.textContent = '▶ Toggle idle/attack';
    btn.onclick = () => {
      this.state = this.state === 'idle' ? 'attack' : 'idle';
      this.frameIndex = 0;
      this.frameTimer = 0;
    };
    card.appendChild(btn);

    // Meta info
    const meta = document.createElement('div');
    meta.className = 'meta';
    const idle   = this.config.idleFrames   ?? {};
    const attack = this.config.attackFrames ?? {};
    const dsize  = this.config.drawSize ?? CONFIG.CELL_SIZE;
    meta.innerHTML =
      `idle: ${idle.cols ?? '?'}c × ${idle.rows ?? '?'}r = ${idle.total ?? '?'} fr` +
      (idle.rowIndex !== undefined ? ` (row ${idle.rowIndex})` : '') + '<br>' +
      `attack: ${attack.cols ?? '?'}c × ${attack.rows ?? '?'}r = ${attack.total ?? '?'} fr` +
      (attack.cols === attack.rows ? '' : '') +
      (this.config.meleeFrames ? `<br>melee: ${this.config.meleeFrames.cols}c × ${this.config.meleeFrames.rows}r` : '') +
      `<br>drawSize: ${dsize}px` +
      (this.config.useIndividualFrames ? '<br><em>individual PNGs</em>' : '');
    card.appendChild(meta);

    // Boss: extra melee button
    if (this.config.isBoss) {
      const btn2 = document.createElement('button');
      btn2.className   = 'state-btn';
      btn2.textContent = '⚔ Melee anim';
      btn2.onclick = () => { this.state = 'melee'; this.frameIndex = 0; };
      card.appendChild(btn2);
    }

    card.addEventListener('mouseenter', () => {
      document.getElementById('info-label').textContent =
        `${this.label} | state:${this.state} | frame:${this.frameIndex}`;
    });

    document.getElementById('sprite-grid').appendChild(card);
  }

  async load() {
    if (this.config.useIndividualFrames) {
      if (this.config.idleFrameFiles)   this.idleImgs   = await Promise.all(this.config.idleFrameFiles.map(loadImage));
      if (this.config.attackFrameFiles) this.attackImgs = await Promise.all(this.config.attackFrameFiles.map(loadImage));
    } else {
      [this.idleImg, this.attackImg] = await Promise.all([
        loadImage(this.config.idleSprite),
        loadImage(this.config.attackSprite),
      ]);
      if (this.config.meleeSprite) this.meleeImg = await loadImage(this.config.meleeSprite);
    }
  }

  update(dt) {
    this.frameTimer += dt;
    if (this.frameTimer >= this.frameDur) {
      this.frameTimer -= this.frameDur;
      let total;
      if (this.config.useIndividualFrames) {
        // Use the actual array length — layout.total is a stub (1) for individual-frame enemies
        total = (this.state === 'attack' ? this.attackImgs.length : this.idleImgs.length) || 1;
      } else {
        total = this._layout()?.total ?? 1;
      }
      this.frameIndex = (this.frameIndex + 1) % total;
    }
  }

  _layout() {
    if (this.state === 'melee') return this.config.meleeFrames   ?? this.config.attackFrames;
    if (this.state === 'attack') return this.config.attackFrames ?? null;
    return this.config.idleFrames ?? null;
  }

  draw() {
    const ctx = this.ctx;
    const cw  = this.canvas.width;
    const ch  = this.canvas.height;
    ctx.clearRect(0, 0, cw, ch);

    // Checkerboard background
    for (let row = 0; row < 8; row++) {
      for (let col = 0; col < 8; col++) {
        ctx.fillStyle = (row + col) % 2 === 0 ? '#1a2a1a' : '#223022';
        ctx.fillRect(col * 20, row * 20, 20, 20);
      }
    }

    const cx = cw / 2;
    const cy = ch / 2;
    const drawSize = this.config.drawSize ?? CONFIG.CELL_SIZE;

    if (this.config.useIndividualFrames) {
      this._drawIndividual(ctx, cx, cy, drawSize);
    } else {
      this._drawSheet(ctx, cx, cy, drawSize);
    }

    // Cross-hair
    ctx.strokeStyle = 'rgba(255,255,100,0.25)';
    ctx.lineWidth   = 0.5;
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, ch); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(cw, cy); ctx.stroke();

    // Frame counter
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, ch - 16, cw, 16);
    ctx.fillStyle   = '#adf';
    ctx.font        = '10px monospace';
    ctx.textAlign   = 'left';
    ctx.fillText(`[${this.state}] frame ${this.frameIndex}`, 4, ch - 4);

    // Update progress bar
    if (this.frameFill) {
      const layout = this._layout();
      const total  = layout?.total ?? 1;
      this.frameFill.style.width = ((this.frameIndex + 1) / total * 100).toFixed(1) + '%';
    }
  }

  _drawSheet(ctx, cx, cy, drawSize) {
    let sprite, layout;
    if (this.state === 'melee') {
      sprite = this.meleeImg ?? this.attackImg;
      layout = this.config.meleeFrames ?? this.config.attackFrames;
    } else if (this.state === 'attack') {
      sprite = this.attackImg;
      layout = this.config.attackFrames;
    } else {
      sprite = this.idleImg;
      layout = this.config.idleFrames;
    }
    if (!sprite || !layout) {
      this._drawFallback(ctx, cx, cy);
      return;
    }

    const cols = layout.cols ?? 1;
    const rows = layout.rows ?? 1;
    const fw   = sprite.width  / cols;
    const fh   = sprite.height / rows;
    const col  = this.frameIndex % cols;
    const row  = (layout.rowIndex !== undefined)
      ? layout.rowIndex
      : Math.floor(this.frameIndex / cols);

    const scale = Math.min(drawSize / fw, drawSize / fh);
    const dw    = fw * scale;
    const dh    = fh * scale;

    ctx.drawImage(sprite, col * fw, row * fh, fw, fh,
      cx - dw / 2, cy - dh / 2, dw, dh);
  }

  _drawIndividual(ctx, cx, cy, drawSize) {
    const imgs = this.state === 'attack' ? this.attackImgs : this.idleImgs;
    const img  = imgs[this.frameIndex % (imgs.length || 1)];
    if (!img) { this._drawFallback(ctx, cx, cy); return; }

    const scale = Math.min(drawSize / img.width, drawSize / img.height);
    const dw    = img.width  * scale;
    const dh    = img.height * scale;
    ctx.drawImage(img, cx - dw / 2, cy - dh / 2, dw, dh);
  }

  _drawFallback(ctx, cx, cy) {
    ctx.fillStyle   = '#663';
    ctx.fillRect(cx - 24, cy - 24, 48, 48);
    ctx.fillStyle   = '#ff8';
    ctx.font        = '10px monospace';
    ctx.textAlign   = 'center';
    ctx.fillText('NO SPRITE', cx, cy + 4);
  }
}

// ── Global toggle ─────────────────────────────────────────────────────────────
const allCards = [];
let globalState = 'idle';
window.toggleAllState = function() {
  globalState = globalState === 'idle' ? 'attack' : 'idle';
  allCards.forEach(c => { c.state = globalState; c.frameIndex = 0; });
};

// ── Spawn Arena ───────────────────────────────────────────────────────────────
class SpawnArena {
  constructor(canvas) {
    this.canvas  = canvas;
    this.ctx     = canvas.getContext('2d');
    this.sprites = [];   // { config, frameIndex, frameTimer, state, x, y, isEnemy }
    this.lastTime = 0;
  }

  spawn(config, isEnemy, x, y) {
    const s = {
      config,
      isEnemy,
      x: x ?? (isEnemy ? canvas.width + 40 : 80 + Math.random() * 200),
      y: y ?? (80 + Math.random() * (canvas.height - 160)),
      frameIndex: 0,
      frameTimer: 0,
      state: 'idle',
      vx: isEnemy ? -(30 + Math.random() * 60) : 0,
      idleImg:   imageCache[config.idleSprite]   ?? null,
      attackImg: imageCache[config.attackSprite] ?? null,
      meleeImg:  config.meleeSprite ? imageCache[config.meleeSprite] ?? null : null,
    };
    // Individual frames
    if (config.useIndividualFrames) {
      s.idleImgs   = (config.idleFrameFiles   ?? []).map(k => imageCache[k] ?? null);
      s.attackImgs = (config.attackFrameFiles ?? []).map(k => imageCache[k] ?? null);
    }
    this.sprites.push(s);
  }

  update(dt) {
    for (const s of this.sprites) {
      s.frameTimer += dt;
      const layout = s.state === 'attack'
        ? s.config.attackFrames
        : s.config.idleFrames;
      const total = layout?.total ?? (s.idleImgs?.length || 1);
      const fps   = 1 / ANIM_FPS;
      if (s.frameTimer >= fps) {
        s.frameTimer -= fps;
        s.frameIndex = (s.frameIndex + 1) % total;
      }
      if (s.isEnemy) {
        s.x += s.vx * dt;
        if (s.x < -80) s.x = this.canvas.width + 40;
      }
    }
  }

  draw() {
    const ctx = this.ctx;
    const cw  = this.canvas.width;
    const ch  = this.canvas.height;

    // Background
    ctx.fillStyle = '#1a2a1a';
    ctx.fillRect(0, 0, cw, ch);

    // Lane lines
    ctx.strokeStyle = '#2a3a2a';
    ctx.lineWidth   = 1;
    for (let lane = 0; lane <= 5; lane++) {
      const y = lane * (ch / 5);
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cw, y); ctx.stroke();
    }

    for (const s of this.sprites) {
      if (s.config.useIndividualFrames) {
        this._drawIndividual(ctx, s);
      } else {
        this._drawSheet(ctx, s);
      }

      // Label
      ctx.fillStyle   = '#adf';
      ctx.font        = '9px monospace';
      ctx.textAlign   = 'center';
      ctx.fillText(s.config.label ?? '?', s.x, s.y + (s.config.drawSize ?? 40) / 2 + 10);
    }
  }

  _drawSheet(ctx, s) {
    const state  = s.state;
    let sprite, layout;
    if (state === 'attack') { sprite = s.attackImg; layout = s.config.attackFrames; }
    else                    { sprite = s.idleImg;   layout = s.config.idleFrames;   }
    if (!sprite || !layout) return;

    const cols = layout.cols ?? 1;
    const rows = layout.rows ?? 1;
    const fw   = sprite.width  / cols;
    const fh   = sprite.height / rows;
    const col  = s.frameIndex % cols;
    const row  = (layout.rowIndex !== undefined)
      ? layout.rowIndex
      : Math.floor(s.frameIndex / cols);

    const ds    = s.config.drawSize ?? CONFIG.CELL_SIZE;
    const scale = Math.min(ds / fw, ds / fh);
    const dw    = fw * scale;
    const dh    = fh * scale;

    ctx.drawImage(sprite, col * fw, row * fh, fw, fh,
      s.x - dw / 2, s.y - dh / 2, dw, dh);
  }

  _drawIndividual(ctx, s) {
    const imgs = s.state === 'attack' ? s.attackImgs : s.idleImgs;
    const img  = imgs?.[s.frameIndex % (imgs?.length || 1)];
    if (!img) return;
    const ds    = s.config.drawSize ?? CONFIG.CELL_SIZE;
    const scale = Math.min(ds / img.width, ds / img.height);
    const dw    = img.width  * scale;
    const dh    = img.height * scale;
    ctx.drawImage(img, s.x - dw / 2, s.y - dh / 2, dw, dh);
  }
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
async function main() {
  // Pre-load all images
  const allSrcs = [];
  for (const d of Object.values(UNIT_DEFS)) {
    allSrcs.push(d.idleSprite, d.attackSprite);
    if (d.projectileSprite) allSrcs.push(d.projectileSprite);
  }
  for (const d of Object.values(ENEMY_DEFS)) {
    allSrcs.push(d.idleSprite, d.attackSprite);
    if (d.meleeSprite) allSrcs.push(d.meleeSprite);
    if (d.ravenSprite) allSrcs.push(d.ravenSprite);
    if (d.useIndividualFrames) {
      allSrcs.push(...(d.idleFrameFiles ?? []), ...(d.attackFrameFiles ?? []));
    }
  }
  await loadImages(allSrcs);

  // Build sprite cards — units first, then enemies
  const unitEntries  = Object.values(UNIT_DEFS);
  const enemyEntries = Object.values(ENEMY_DEFS);

  for (const def of unitEntries) {
    const card = new SpriteCard(`🟢 ${def.label}`, def, 'unit');
    await card.load();
    allCards.push(card);
  }
  for (const def of enemyEntries) {
    const card = new SpriteCard(`🔴 ${def.label}`, def, 'enemy');
    await card.load();
    allCards.push(card);
  }

  // ── Spawn arena setup ──────────────────────────────────────────────────────
  const spawnCanvas = document.getElementById('spawn-canvas');
  const arena = new SpawnArena(spawnCanvas);
  const controls = document.getElementById('spawn-controls');
  const log = document.getElementById('spawn-log');

  function addLog(msg) {
    const line = document.createElement('div');
    line.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
    log.prepend(line);
    if (log.children.length > 20) log.lastChild.remove();
  }

  // Spawn buttons for each enemy
  for (const def of enemyEntries) {
    const btn = document.createElement('button');
    btn.className   = 'spawn-btn';
    btn.textContent = `👾 Spawn ${def.label}`;
    btn.onclick = () => {
      arena.spawn(def, true);
      addLog(`Spawned ${def.label}`);
    };
    controls.appendChild(btn);
  }

  // Spawn buttons for each unit
  for (const def of unitEntries) {
    const btn = document.createElement('button');
    btn.className   = 'spawn-btn';
    btn.textContent = `🟢 Place ${def.label}`;
    btn.onclick = () => {
      arena.spawn(def, false, 80 + Math.random() * 300, 60 + Math.random() * 300);
      addLog(`Placed ${def.label}`);
    };
    controls.appendChild(btn);
  }

  // Toggle attack on all arena sprites
  const atkBtn = document.createElement('button');
  atkBtn.className   = 'spawn-btn';
  atkBtn.textContent = '⚔ Toggle All Attack';
  atkBtn.onclick = () => {
    arena.sprites.forEach(s => {
      s.state = s.state === 'idle' ? 'attack' : 'idle';
      s.frameIndex = 0;
    });
  };
  controls.appendChild(atkBtn);

  // Clear
  const clearBtn = document.createElement('button');
  clearBtn.className   = 'spawn-btn';
  clearBtn.textContent = '🗑 Clear Arena';
  clearBtn.onclick = () => { arena.sprites = []; addLog('Cleared'); };
  controls.appendChild(clearBtn);

  // ── Main loop ─────────────────────────────────────────────────────────────
  let lastTs  = 0;
  let frames  = 0;
  let fpsAcc  = 0;
  let fpsDisp = 0;

  function loop(ts) {
    const dt = Math.min((ts - lastTs) / 1000, 0.1);
    lastTs = ts;

    // FPS
    fpsAcc += dt; frames++;
    if (fpsAcc >= 0.5) {
      fpsDisp = Math.round(frames / fpsAcc);
      frames = fpsAcc = 0;
      document.getElementById('fps-label').textContent = `FPS: ${fpsDisp}`;
    }

    // Update & draw sprite cards
    for (const card of allCards) {
      card.update(dt);
      card.draw();
    }

    // Update & draw spawn arena (only when visible)
    if (document.getElementById('spawn-section').classList.contains('visible')) {
      arena.update(dt);
      arena.draw();
    }

    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);
}

main();
</script>
</body>
</html>
