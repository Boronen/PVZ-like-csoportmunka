<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garden Defense</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }
    h1 {
      margin-bottom: 12px;
      font-size: 2rem;
      color: #a8ff78;
      text-shadow: 0 0 10px #4caf50;
    }
    #game-container {
      position: relative;
      border: 3px solid #4caf50;
      border-radius: 6px;
      box-shadow: 0 0 30px #4caf5066;
    }
    canvas {
      display: block;
    }
    #overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      font-size: 2.5rem;
      font-weight: bold;
      border-radius: 3px;
      pointer-events: none;
    }
    #overlay.visible { display: flex; }
    #overlay.win  { color: #a8ff78; }
    #overlay.lose { color: #ff6b6b; }
    #start-btn {
      margin-top: 14px;
      padding: 10px 36px;
      font-size: 1.1rem;
      background: #4caf50;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #start-btn:hover { background: #66bb6a; }
    #instructions {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #aaa;
      text-align: center;
      max-width: 860px;
    }
  </style>
</head>
<body>
  <h1>🌿 Garden Defense</h1>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="overlay"></div>
  </div>
  <button id="start-btn">▶ Start Game</button>
  <p id="instructions">
    Click a slot (bottom bar) to select a unit → Click the grid to place it.<br>
    Press <kbd>P</kbd> to pause. Defend the base — don't let enemies through!
  </p>
  <script type="module" src="src/main.js"></script>
</body>
</html>
